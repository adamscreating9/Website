<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Background image layer */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Semi-transparent dark overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    nav {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 56px;
      padding: 24px;
    }

    button {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.5rem;
      color: #F7E96B;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 16px 24px;
      letter-spacing: 0.05em;
      /* Tap target: at least 48px tall */
      min-height: 56px;
      transition: color 0.2s ease, text-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover,
    button:active {
      color: #fff;
      text-shadow:
        0 0 8px #F7E96B,
        0 0 20px #F7E96B,
        0 0 40px rgba(247, 233, 107, 0.5);
    }

    @media (max-width: 480px) {
      button {
        font-size: 1.1rem;
        padding: 16px 20px;
      }

      nav {
        gap: 48px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <button>About</button>
    <button>Mind Maps</button>
    <button>Paintings</button>
  </nav>
</body>
</html>
